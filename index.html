<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masters Pool 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a3a2a;
    --gold: #c9a84c;
    --cream: #f5f0e8;
    --muted: #8a7a5a;
    --border: rgba(201,168,76,0.15);
    --border-lead: rgba(201,168,76,0.55);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--green); color:var(--cream); font-family:'IBM Plex Mono',monospace; min-height:100vh; background-image:radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.05) 0%, transparent 60%); }

/* HEADER */
header { text-align:center; padding:1.75rem 1rem 1.25rem; border-bottom:1px solid rgba(201,168,76,0.3); }
.title { font-family:‘Playfair Display’,serif; font-size:clamp(1.6rem,5vw,2.8rem); font-weight:900; color:var(–gold); letter-spacing:0.05em; }
.subtitle { font-size:0.65rem; letter-spacing:0.3em; color:var(–muted); margin-top:0.3rem; text-transform:uppercase; }
.badge { display:inline-flex; align-items:center; background:rgba(201,168,76,0.1); border:1px solid rgba(201,168,76,0.2); padding:0.2rem 0.75rem; margin-top:0.5rem; font-size:0.6rem; color:var(–gold); letter-spacing:0.1em; }

/* TABS */
.tab-bar { display:flex; border-bottom:1px solid rgba(201,168,76,0.2); background:rgba(0,0,0,0.2); }
.tab-btn { flex:1; padding:0.75rem 0.5rem; font-family:‘IBM Plex Mono’,monospace; font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; cursor:pointer; border:none; background:transparent; color:var(–muted); border-bottom:2px solid transparent; transition:all 0.2s; }
.tab-btn.active { color:var(–gold); border-bottom-color:var(–gold); background:rgba(201,168,76,0.05); }

/* CONTENT */
.tab-content { display:none; max-width:900px; margin:0 auto; padding:1.5rem 1rem; }
.tab-content.active { display:block; }

.section-label { font-size:0.6rem; letter-spacing:0.3em; color:var(–gold); text-transform:uppercase; margin-bottom:1rem; display:flex; align-items:center; gap:0.75rem; }
.section-label::after { content:’’; flex:1; height:1px; background:rgba(201,168,76,0.2); }

/* TEAM CARDS */
.team-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:1rem; margin-bottom:1.5rem; }
.team-card { background:rgba(255,255,255,0.04); border:1px solid var(–border); padding:1.25rem; position:relative; }
.team-card.lead { background:rgba(201,168,76,0.07); border-color:var(–border-lead); }
.team-badge { position:absolute; top:-1px; right:-1px; background:rgba(201,168,76,0.2); color:var(–gold); font-size:0.55rem; font-weight:700; padding:0.2rem 0.6rem; letter-spacing:0.1em; }
.team-card.lead .team-badge { background:var(–gold); color:var(–green); }
.team-name { font-family:‘Playfair Display’,serif; font-size:1.25rem; color:var(–cream); margin-bottom:0.75rem; }
.score-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.4rem; }
.score-label { font-size:0.55rem; letter-spacing:0.1em; color:var(–muted); text-transform:uppercase; }
.score-big { font-size:1.25rem; font-weight:700; color:var(–gold); }
.score-big.grn { color:#7dd87d; }
.score-rank { font-size:0.6rem; color:var(–muted); margin-left:3px; }
.divider { height:1px; background:rgba(201,168,76,0.1); margin:0.75rem 0; }
.player-line { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.3rem; font-size:0.68rem; }
.player-line-name { color:var(–cream); }
.player-line-stats { display:flex; gap:0.5rem; }
.bird { color:#7dd87d; }
.under { color:#7dd87d; } .over { color:#ff8080; } .even { color:var(–cream); }

.summary-box { padding:0.9rem; background:rgba(201,168,76,0.05); border:1px solid rgba(201,168,76,0.1); font-size:0.6rem; color:var(–muted); line-height:1.9; }
.summary-title { color:var(–gold); margin-bottom:0.3rem; letter-spacing:0.1em; font-size:0.62rem; }

/* PLAYER TABLE */
.player-table { width:100%; border-collapse:collapse; font-size:0.7rem; }
.player-table th { font-size:0.55rem; letter-spacing:0.15em; color:var(–muted); text-transform:uppercase; padding:0.5rem 0.6rem; text-align:left; border-bottom:1px solid rgba(201,168,76,0.15); }
.player-table td { padding:0.55rem 0.6rem; border-bottom:1px solid rgba(255,255,255,0.04); color:var(–cream); }
.owner-tag { font-size:0.52rem; padding:0.1rem 0.35rem; border-radius:2px; font-weight:700; }

/* TEE TIMES */
.tee-rows { display:flex; flex-direction:column; gap:0.5rem; }
.tee-row { background:rgba(255,255,255,0.04); border:1px solid rgba(201,168,76,0.12); padding:0.75rem 1rem; display:flex; align-items:center; gap:1rem; flex-wrap:wrap; }
.tee-time-val { font-size:0.85rem; font-weight:700; color:var(–gold); min-width:7rem; }
.tee-name { font-size:0.78rem; color:var(–cream); }
.tee-group { font-size:0.58rem; color:var(–muted); margin-top:0.15rem; }
.tee-right { margin-left:auto; text-align:right; }
.tee-score { font-size:0.75rem; font-weight:700; font-family:‘IBM Plex Mono’,monospace; }
.tee-pos { font-size:0.6rem; color:var(–muted); }

@media(max-width:480px) { .team-grid { grid-template-columns:1fr; } }
</style>

</head>
<body>

<header>
  <div class="title">THE MASTERS POOL</div>
  <div class="subtitle">Augusta National &middot; 2026</div>
  <div class="badge">Round 1 Final &middot; R2 Friday</div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('standings')">⛳ Pool</button>
  <button class="tab-btn" onclick="showTab('players')">📋 Players</button>
  <button class="tab-btn" onclick="showTab('teetimes')">🕐 Tee Times</button>
</div>

<!-- TAB 1: POOL STANDINGS -->

<div id="tab-standings" class="tab-content active">
  <div class="section-label">Team Standings — After Round 1</div>
  <div class="team-grid" id="teamGrid"></div>
  <div class="summary-box">
    <div class="summary-title">SUMMARY</div>
    <div id="summary"></div>
  </div>
</div>

<!-- TAB 2: PLAYERS -->

<div id="tab-players" class="tab-content">
  <div class="section-label">All Players — Round 1 Final</div>
  <div style="overflow-x:auto">
    <table class="player-table">
      <thead><tr>
        <th>Pos</th><th>Player</th><th>R1</th><th>Birdies+</th><th>Team</th>
      </tr></thead>
      <tbody id="playerTable"></tbody>
    </table>
  </div>
</div>

<!-- TAB 3: TEE TIMES -->

<div id="tab-teetimes" class="tab-content">
  <div class="section-label">Round 2 Tee Times — Friday (CT)</div>
  <div class="tee-rows" id="teeTimes"></div>
</div>

<script>
const PLAYERS = [
  { name:"Scottie Scheffler",  owner:"Kaleb",  score:"-2", pos:6,  posD:"T6",  birdies:2, tee:"9:19 AM CT",  group:"MacIntyre, Woodland" },
  { name:"Cameron Young",      owner:"Kaleb",  score:"+1", pos:33, posD:"T33", birdies:3, tee:"12:44 PM CT", group:"McIlroy, Howell" },
  { name:"Ludvig Aberg",       owner:"Kaleb",  score:"+2", pos:40, posD:"T40", birdies:4, tee:"8:43 AM CT",  group:"Rahm, Gotterup" },
  { name:"Xander Schauffele",  owner:"Markus", score:"-2", pos:6,  posD:"T6",  birdies:5, tee:"12:20 PM CT", group:"DeChambeau, Fitzpatrick" },
  { name:"Bryson DeChambeau",  owner:"Markus", score:"+4", pos:56, posD:"T56", birdies:2, tee:"12:20 PM CT", group:"Fitzpatrick, Schauffele" },
  { name:"Robert MacIntyre",   owner:"Markus", score:"+8", pos:82, posD:"T82", birdies:1, tee:"9:19 AM CT",  group:"Scheffler, Woodland" },
  { name:"Tommy Fleetwood",    owner:"Jacob",  score:"-1", pos:10, posD:"T10", birdies:5, tee:"12:08 PM CT", group:"Reed, Bhatia" },
  { name:"Matt Fitzpatrick",   owner:"Jacob",  score:"+2", pos:40, posD:"T40", birdies:2, tee:"12:20 PM CT", group:"DeChambeau, Schauffele" },
  { name:"Jon Rahm",           owner:"Jacob",  score:"+6", pos:73, posD:"T73", birdies:0, tee:"8:43 AM CT",  group:"Gotterup, Aberg" },
];

const OC = {
  Kaleb:  { bg:"rgba(100,149,237,0.2)", color:"#a0c4ff", border:"rgba(100,149,237,0.4)" },
  Markus: { bg:"rgba(255,160,80,0.2)",  color:"#ffc080", border:"rgba(255,160,80,0.4)" },
  Jacob:  { bg:"rgba(130,200,100,0.2)", color:"#a0e070", border:"rgba(130,200,100,0.4)" },
};

function sc(s) { const n=parseFloat(s); return isNaN(n)?"even":n<0?"under":n>0?"over":"even"; }

function ownerTag(owner) {
  const o = OC[owner]||{};
  return `<span class="owner-tag" style="background:${o.bg};color:${o.color};border:1px solid ${o.border}">${owner}</span>`;
}

// Build standings
const teams = ["Kaleb","Markus","Jacob"].map(owner => {
  const players = PLAYERS.filter(p=>p.owner===owner);
  return { owner, players, totalPos:players.reduce((s,p)=>s+p.pos,0), totalBirdies:players.reduce((s,p)=>s+p.birdies,0) };
});
function rankBy(arr,key,asc){ const s=[...arr].sort((a,b)=>asc?a[key]-b[key]:b[key]-a[key]); const r={}; s.forEach((t,i)=>r[t.owner]=i+1); return r; }
const posRanks    = rankBy(teams,"totalPos",true);
const birdieRanks = rankBy(teams,"totalBirdies",false);
const orderedTeams = [...teams].sort((a,b)=>posRanks[a.owner]-posRanks[b.owner]);

// TAB 1: Team cards
const grid = document.getElementById("teamGrid");
orderedTeams.forEach(team => {
  const pr=posRanks[team.owner], br=birdieRanks[team.owner], lead=pr===1;
  const card=document.createElement("div");
  card.className="team-card"+(lead?" lead":"");
  card.innerHTML=`
    <div class="team-badge">${lead?"🏆 LEADING":"#"+pr}</div>
    <div class="team-name">${team.owner}</div>
    <div class="score-row"><span class="score-label">Placing Score</span><span class="score-big">${team.totalPos}<span class="score-rank">#${pr}</span></span></div>
    <div class="score-row"><span class="score-label">Birdies or Better</span><span class="score-big grn">${team.totalBirdies}<span class="score-rank">#${br}</span></span></div>
    <div class="divider"></div>
    ${team.players.map(p=>`<div class="player-line"><span class="player-line-name">${p.name}</span><div class="player-line-stats"><span class="bird">🐦${p.birdies}</span><span class="${sc(p.score)}">${p.score}(${p.posD})</span></div></div>`).join("")}
  `;
  grid.appendChild(card);
});

// Summary
const bl = [...teams].sort((a,b)=>b.totalBirdies-a.totalBirdies)[0];
document.getElementById("summary").innerHTML=
  `🥇 Placing leader: <span style="color:var(--gold)">${orderedTeams[0].owner}</span> (${orderedTeams[0].totalPos} pts)<br>
   🐦 Birdie leader: <span style="color:#7dd87d">${bl.owner}</span> (${bl.totalBirdies} holes)`;

// TAB 2: Player table
const tbody = document.getElementById("playerTable");
[...PLAYERS].sort((a,b)=>a.pos-b.pos).forEach(p=>{
  const tr=document.createElement("tr");
  tr.innerHTML=`
    <td>${p.posD}</td>
    <td>${p.name}</td>
    <td class="${sc(p.score)}">${p.score}</td>
    <td style="color:#7dd87d">${p.birdies}</td>
    <td>${ownerTag(p.owner)}</td>
  `;
  tbody.appendChild(tr);
});

// TAB 3: Tee times
function toMins(t){ const [time,period]=t.split(" "); let [h,m]=time.split(":").map(Number); if(period==="PM"&&h!==12)h+=12; if(period==="AM"&&h===12)h=0; return h*60+m; }
const teeContainer = document.getElementById("teeTimes");
[...PLAYERS].sort((a,b)=>toMins(a.tee)-toMins(b.tee)).forEach(p=>{
  const o=OC[p.owner]||{};
  const row=document.createElement("div");
  row.className="tee-row";
  row.innerHTML=`
    <div>
      <div class="tee-time-val">${p.tee}</div>
    </div>
    <div style="flex:1">
      <div class="tee-name">${p.name}</div>
      <div class="tee-group">w/ ${p.group}</div>
    </div>
    <div class="tee-right">
      ${ownerTag(p.owner)}
      <div class="tee-score ${sc(p.score)}" style="margin-top:0.2rem">${p.score} (${p.posD})</div>
    </div>
  `;
  teeContainer.appendChild(row);
});

// Tab switching
function showTab(name) {
  document.querySelectorAll(".tab-content").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(el=>el.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  event.target.classList.add("active");
}
</script>

</body>
</html>
